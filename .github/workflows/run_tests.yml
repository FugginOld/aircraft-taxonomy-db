name: Run test suite

# Runs the pytest suite (tests/) whenever pipeline scripts, the API, the
# tests themselves, or their dependencies change. Data-only changes don't
# trigger this - see check_custom_db.yml / check_main_databases.yml for those.

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "api/**"
      - "tests/**"
      - ".github/workflows/run_tests.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "api/**"
      - "tests/**"
      - ".github/workflows/run_tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run pytest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -r api/requirements.txt
          pip install -r tests/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: scripts
        run: python -m pytest tests/ -v
